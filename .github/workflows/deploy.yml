name: Deploy to Siteground

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Test SSH Connection (Debug)
        env:
          SSH_KEY: ${{ secrets.SITEGROUND_SSH_KEY }}
          SSH_PASSPHRASE: ${{ secrets.SSH_PASSPHRASE }}
          SSH_HOST: ${{ secrets.SITEGROUND_HOST }}
          SSH_USER: ${{ secrets.SITEGROUND_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh -vvvv -i ~/.ssh/id_rsa -p 18765 $SSH_USER@$SSH_HOST "echo 'Connection successful'"
      
      - name: Deploy to Siteground
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SITEGROUND_HOST }}
          username: ${{ secrets.SITEGROUND_USER }}
          key: ${{ secrets.SITEGROUND_SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: 18765
          script: |
            cd /home/sfolard@gmail.com/public_html/dev
            git pull origin main
